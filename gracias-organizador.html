<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gracias — El Organizador de Bodas Slow</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital,wght@0,400;1,400&family=Inter+Tight:ital,wght@0,300..700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">

  <style>
    .gracias-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 4%;
      background: var(--bg-color);
    }

    .gracias-inner {
      max-width: 520px;
      text-align: center;
    }

    .gracias-eyebrow {
      font-family: var(--font-body);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2.2px;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 2.5rem;
      display: block;
    }

    .gracias-title {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      line-height: 1.05;
      margin-bottom: 1.5rem;
    }

    .gracias-text {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.75;
      margin-bottom: 3rem;
    }

    .gracias-divider {
      width: 40px;
      height: 1px;
      background: var(--line-soft);
      margin: 2.5rem auto;
    }

    .gracias-nota {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      border: 1.5px solid transparent;
    }

    .btn-primary {
      background: var(--text-primary);
      color: var(--bg-color);
      border-color: var(--text-primary);
    }

    .btn-primary:hover {
      background: var(--accent-color);
      border-color: var(--accent-color);
    }
  </style>
</head>
<body>

  <div class="gracias-wrap">
    <div class="gracias-inner">
      <span class="gracias-eyebrow">La Lista Slow</span>
      <h1 class="gracias-title">Todo <em>listo</em>.</h1>
      <p class="gracias-text">
        Gracias por vuestra compra.<br>
        Ya podéis descargar el Organizador de Bodas Slow.
      </p>
      <a href="./downloads/organizador-bodas-slow.pdf" download="El_Organizador_de_Bodas_Slow.pdf" class="btn btn-primary">
        Descargar el Organizador — PDF
      </a>
      <div class="gracias-divider"></div>
      <p class="gracias-nota">
        Guardad el archivo en un lugar seguro.<br>
        Si tenéis cualquier problema, escribidnos a <a href="mailto:lalistaslow@gmail.com" style="color: var(--text-secondary);">lalistaslow@gmail.com</a>.
      </p>
      <div class="gracias-divider"></div>
      <a href="./" style="font-size: 0.75rem; color: var(--text-muted); text-decoration: none; letter-spacing: 1px; text-transform: uppercase;">← Volver a La Lista Slow</a>
    </div>
  </div>

</body>
</html>
